<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indian Music Player with Search</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div class="player-container">
        <div class="music-player">
            <div class="song-details">
                <div class="album-art">
                    <i class="fa-solid fa-music"></i>
                </div>
                <h2 id="title">Song Title</h2>
                <h3 id="artist">Artist Name</h3>
            </div>

            <div class="progress-container">
                <input type="range" id="progress" min="0" max="100" value="0">
                <div class="time-stamps">
                    <span id="current-time">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>

            <div class="controls">
                <button id="prev" title="Previous"><i class="fa-solid fa-backward-step"></i></button>
                <button id="play-pause" class="play-btn" title="Play"><i class="fa-solid fa-play"></i></button>
                <button id="next" title="Next"><i class="fa-solid fa-forward-step"></i></button>
            </div>

            <div class="volume-container">
                <i class="fa-solid fa-volume-high" id="volume-icon"></i>
                <input type="range" id="volume" min="0" max="1" step="0.05" value="0.7">
            </div>

            <audio id="audio" src=""></audio>
        </div>

        <div class="playlist-card">
            <h3><i class="fa-solid fa-list"></i> Playlist</h3>
            
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="search-input" placeholder="Search songs or language...">
            </div>

            <ul id="playlist-tracks">
                </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
